<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MOYXYOM Pro: Panel de Control Documental</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo">MOYXYOM <span class="pro-tag">PRO</span></div>
    <div class="user-status">Zona Gratuita (Límite 5MB)</div>
</header>

<section id="panel-pro" style="background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 2px solid #fbbf24;">
    <h2 style="color: #fbbf24; margin-bottom: 10px;">🚀 Pásate a MOYXYOM Pro</h2>
    <p style="margin-bottom: 15px; font-size: 14px;">Desbloquea archivos ilimitados (sin límite de 5MB) y herramientas premium.</p>
    
    <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
        
        <div style="min-width: 200px;">
            <div id="paypal-button-container-P-3JK46579T3334720GNHEKADY"></div>
            <script src="https://www.paypal.com/sdk/js?client-id=AeqJNpfQGMNljeDIX6tvxunXECAwVYU9DWNyHn1YBpVtAQWrau-E5f10jhYZpDwb-y6hYvk50FTaTmDi&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>
            <script>
                paypal.Buttons({
                    style: { shape: 'rect', color: 'gold', layout: 'vertical', label: 'paypal', height: 40 },
                    createSubscription: function(data, actions) {
                        return actions.subscription.create({ 'plan_id': 'P-3JK46579T3334720GNHEKADY' });
                    },
                    onApprove: function(data, actions) {
                        alert("¡Suscripción exitosa! Tu ID es: " + data.subscriptionID + "\nEn breve recibirás tu llave VIP por email.");
                    }
                }).render('#paypal-button-container-P-3JK46579T3334720GNHEKADY');
            </script>
        </div>

        <a href="https://www.mercadopago.com.ar/subscriptions/checkout?preapproval_plan_id=d5b3fd6331a84fba857a3ae5008c7f8b" 
           target="_blank" 
           style="background: #00a650; color: white; height: 40px; padding: 0 25px; text-decoration: none; border-radius: 4px; font-weight: bold; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; font-size: 14px;">
            🇦🇷 Pagar en Pesos (MP)
        </a>
    </div>

    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; max-width: 400px; margin: 0 auto;">
        <label style="display: block; font-size: 12px; margin-bottom: 5px;">¿Ya tienes tu Llave VIP? Pégala aquí:</label>
        <input type="password" id="vip-key" placeholder="Pega tu código MOYXYOM-..." style="width: 100%; padding: 10px; border-radius: 4px; border: none; text-align: center; color: black; font-weight: bold;">
    </div>
</section>

<main class="container">
    <section class="tools-grid">
        <button class="tool-btn active" data-action="pdf-to-docx">PDF a Word</button>
        <button class="tool-btn" data-action="docx-to-pdf">Word a PDF</button>
        <button class="tool-btn" data-action="ocr">OCR (Imagen a Texto)</button>
        <button class="tool-btnacc" data-action="merge">Unir PDFs</button>
        <button class="tool-btnacc" data-action="split">Dividir PDF</button>
        <button class="tool-btnacc" data-action="extract-images">Extraer Imágenes</button>
    </section>

    <section id="lienzo-espacio" class="oculto">
        <h3 style="text-align: center; color: #333; margin-bottom: 10px;">Vista Previa del Documento</h3>
        <div id="pdf-grid"></div>
    </section>

    <section id="drop-zone" class="drop-zone">
        <div class="drop-content">
            <span class="icon">📄</span>
            <p id="drop-text">Arrastra aquí tus archivos para <strong id="current-action-text">PDF a Word</strong></p>
            <p class="sub-text">O haz clic para explorar</p>
            <input type="file" id="file-input" hidden multiple>
        </div>
        <div id="file-list" class="file-list"></div>
    </section>

    <section class="action-zone">
        <button id="process-btn" class="process-btn" disabled>Iniciar Proceso</button>
        <div id="status"></div>
    </section>
</main>

<script src="pdf.min.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
